name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg: [13, 14, 15, 16, 17]
    services:
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_DB: otp_test
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Install pgcrypto extension
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d otp_test -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
      - name: Install functions
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d otp_test -f otp.sql
      - name: Run tests
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d otp_test -f test/test.sql
